<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Between Worlds | Lucas Reed</title>
<link rel="icon" href="npc-logo.webp">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0d0b;color:#e8e2d8;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.container{max-width:500px}
h1{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:#c9a96e;margin-bottom:16px}
h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;margin-bottom:24px;opacity:.8}
p{color:#8a8278;font-size:14px;line-height:1.7;font-weight:300;margin-bottom:32px}
a{color:#c9a96e;text-decoration:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(201,169,110,.3);padding:12px 28px;border-radius:2px;display:inline-block}
a:hover{background:rgba(201,169,110,.1)}
.quote{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:#8a8278;margin-top:48px;opacity:.5}
</style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <h2>Lost between worlds</h2>
  <p>You've crossed into a space that doesn't exist yet. Like Theo on his first night on Vaelith, the ground beneath you isn't quite where you expected it to be.</p>
  <a href="/">Find your way back</a>
  <div class="quote">"The stone pulsed once, then went still."</div>
</div>
</body>
</html>
